<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Randomizer 1-49</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 20px;
        }
        h1 { color: #333; }
        #grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 20px 0;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .number {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h1>Number Shuffler</h1>
    <div id="grid"></div>
    <button onclick="renderNumbers()">Shuffle Numbers</button>

    <script>
        function generateShuffledArray() {
            // Create array from 1 to 49
            const numbers = Array.from({ length: 49 }, (_, i) => i + 1);
            
            // Fisher-Yates Shuffle Algorithm
            for (let i = numbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            }
            return numbers;
        }

        function renderNumbers() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // Clear current numbers
            
            const shuffled = generateShuffledArray();
            
            shuffled.forEach(num => {
                const div = document.createElement('div');
                div.className = 'number';
                div.textContent = num;
                grid.appendChild(div);
            });
        }

        // Initial call to display numbers on load
        renderNumbers();
    </script>
</body>
</html>
